<!DOCTYPE html>
<html> 
    <head> 
        <meta charset = "utf-8">
        <title> Mokepon </title>
        <link rel="stylesheet" href="ddd.css"> <!-- etiqueta HTMl que se usa para vincular archivos externos -->
    </head>

    <body>
        <section id="seleccionar-mascota"> 
            <h1 class="titulo"> MOKEPON </h1>
            <h2 class="subtitulo"> Elige a tu mascota:</h2>
            <div id="contenedor-tarjetas" class="tarjetas">

            </div>

            <button id="boton-mascota"> Seleccionar</button>
        </section>

        <section id="ver-mapa"> 
            <h2 class="subtitulo"> Recorre el mapa con tu Mokepon</h2>
            <canvas id="mapa"> </canvas>
        </section>

        <section id="seleccionar-ataque"> 
            <h1 class="titulo"> MOKEPON </h1>
            <h2 class="subtitulo"> Elige tu ataque: </h2>
            <div id="contenedor-ataques" class="botones-ataques"> 

            </div>

            <div id="mensajes"> 
                <p id="resultado"> Suerte! </p>
                
                <section id="reiniciar">
                    <button id="boton-reiniciar"> Reiniciar </button>
                </section>
            </div>

            <div class="ataques"> 
                <div class="ataques-jugador">
                    <p id="victorias-jugador"> 0 </p> 
                    <p id="mascota-jugador"> Jugador </p>
                    <div id="ataque-del-jugador"> </div>
                </div>

                <!-- Se separa estas etiquetas div para poder usar la tecnologia de grid  -->

                <div class="ataques-enemigo">
                    <p id="victorias-enemigo"> 0 </p>
                    <p id="mascota-enemigo"> Contrincante </p>
                    <div id="ataque-del-enemigo"> </div>
                </div>
            </div>

        </section>

        <script src="ddd.js"> </script>
    </body>


</html>
